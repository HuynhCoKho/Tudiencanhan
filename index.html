<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Từ điển cá nhân</title>
  <link rel="stylesheet" href="styles.css?v=20260607-importfix11">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <div class="eyebrow">Drive Personal Dictionary</div>
        <h1>Từ điển cá nhân</h1>
      </div>
      <div class="top-actions">
        <div class="top-buttons">
          <button id="dedupeBtn" type="button">Xóa trùng</button>
          <button id="exportBtn" type="button">Xuất JSON</button>
          <label id="importBtn" class="button file-btn" for="importFile" role="button" tabindex="0">Nhập JSON</label>
          <input id="importFile" class="visually-hidden-file" type="file" accept=".json,application/json" multiple>
        </div>
        <div class="support-box">
          <span class="author">Author: Huỳnh Cỏ Khô</span>
          <button id="donateBtn" class="donate" type="button" aria-expanded="false" aria-controls="donatePanel">Ủng hộ</button>
          <div id="donatePanel" class="donate-panel" hidden>
            <strong>Ủng hộ dự án</strong>
            <div class="donate-actions">
              <a href="https://github.com/sponsors/HuynhCoKho" target="_blank" rel="noopener">GitHub Sponsor</a>
              <button id="momoBtn" type="button">MoMo QR</button>
            </div>
            <div id="qrBox" class="qr-box" hidden>
              <img src="assets/momo-qr.svg?v=20260607-importfix11" alt="MoMo QR Huỳnh Cỏ Khô">
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="searchbar">
      <label>Tìm từ<input id="query" type="search" placeholder="Tìm trong từ/cụm từ gốc hoặc bản dịch..."></label>
      <label class="lang-filter">Ngôn ngữ<select id="languageFilter"></select></label>
      <button id="searchBtn" type="button">Tìm</button>
    </section>

    <section class="workspace">
      <aside class="list-pane">
        <div class="list-head">
          <strong id="count">0 mục từ</strong>
          <div class="pager">
            <button id="firstBtn" type="button">Đầu</button>
            <button id="prevBtn" type="button">Trước</button>
            <button id="nextBtn" type="button">Sau</button>
            <button id="lastBtn" type="button">Cuối</button>
          </div>
        </div>
        <div id="list" class="list"></div>
      </aside>

      <section class="editor-pane">
        <div class="editor-head">
          <h2 id="formTitle">Thêm mục từ</h2>
          <button id="newBtn" type="button">Mới</button>
        </div>
        <form id="entryForm">
          <input id="id" type="hidden">
          <div class="grid two">
            <label><span class="label-row">Từ / cụm từ gốc<button id="speakHeadBtn" type="button" class="mini-inline">Nghe</button></span><input id="headword" required></label>
            <label>Ngôn ngữ gốc<select id="sourceLanguage"></select></label>
          </div>
          <label>Ngôn ngữ dịch<select id="targetLanguage"></select></label>
          <label><span class="label-row">Bản dịch / nội dung tương ứng<button id="speakTransBtn" type="button" class="mini-inline">Nghe</button></span><input id="translation"></label>
          <div class="grid two">
            <label><span class="label-row">Phiên âm<button id="symbolsBtn" type="button" class="mini-inline">IPA/Pinyin</button></span><input id="pronunciation"></label>
            <label>Lĩnh vực<input id="category"></label>
          </div>
          <label>Nghĩa / ghi chú<textarea id="meaning"></textarea></label>
          <label>Ví dụ<textarea id="example"></textarea></label>
          <div>
            <label>Ảnh minh họa<input id="imageFile" type="file" accept="image/*"></label>
            <div id="dropZone" class="drop-zone">Kéo thả ảnh vào đây hoặc chọn file</div>
            <img id="preview" class="preview" alt="Ảnh minh họa">
          </div>
          <div class="form-actions">
            <button id="deleteBtn" class="danger" type="button">Xóa</button>
            <button class="primary" type="submit">Lưu</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div id="symbolsPanel" class="symbols" hidden></div>
  <div id="toast" class="toast" role="status" hidden></div>
  <script src="app.js?v=20260607-importfix11"></script>
</body>
</html>
